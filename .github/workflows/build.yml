name: Build AccessiTools v2 IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Verifier les fichiers
      run: |
        echo "=== Fichiers presents ==="
        find . -not -path './.git/*' | sort
        echo ""
        FILES=(
          "AccessiTools.xcodeproj/project.pbxproj"
          "AccessiTools/AppDelegate.swift"
          "AccessiTools/MainViewController.swift"
          "AccessiTools/FloatingKeyboardWindow.swift"
          "AccessiTools/Info.plist"
          "AccessiTools/entitlements.plist"
        )
        ALL_OK=true
        for f in "${FILES[@]}"; do
          if [ -f "$f" ]; then echo "OK $f"
          else echo "MANQUANT $f"; ALL_OK=false; fi
        done
        if [ "$ALL_OK" = false ]; then exit 1; fi

    - name: Choisir Xcode
      run: |
        if [ -d "/Applications/Xcode_15.4.app" ]; then
          sudo xcode-select -s /Applications/Xcode_15.4.app
        fi
        echo "Xcode: $(xcodebuild -version)"

    - name: Compiler
      run: |
        xcodebuild \
          -project AccessiTools.xcodeproj \
          -scheme AccessiTools \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEAD_CODE_STRIPPING=NO \
          ONLY_ACTIVE_ARCH=NO \
          build \
          SYMROOT="$PWD/build" \
          2>&1 | tee build_log.txt
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "=== ERREURS ==="
          grep "error:" build_log.txt | head -30
          exit 1
        fi

    - name: Installer ldid
      run: brew install ldid

    - name: Signer avec entitlements
      run: |
        APP=$(find build -name "*.app" | grep -v BuildProductsPath | head -1)
        echo "App: $APP"
        ldid -SAccessiTools/entitlements.plist "$APP/AccessiTools"
        echo "Signe OK"

    - name: Creer IPA
      run: |
        APP=$(find build -name "*.app" | grep -v BuildProductsPath | head -1)
        mkdir -p Payload
        cp -r "$APP" Payload/AccessiTools.app
        zip -r AccessiTools.ipa Payload/
        echo "IPA: $(du -sh AccessiTools.ipa)"

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: AccessiTools-v2-IPA
        path: AccessiTools.ipa
        retention-days: 30

    - name: Upload log si erreur
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-erreur
        path: build_log.txt
        retention-days: 7
