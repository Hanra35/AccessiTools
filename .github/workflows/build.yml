name: Build AccessiTools v2 IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode 15.4
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Build app
      run: |
        xcodebuild \
          -project AccessiTools.xcodeproj \
          -target AccessiTools \
          -configuration Release \
          -sdk iphoneos17.5 \
          -destination "generic/platform=iOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEAD_CODE_STRIPPING=NO \
          SYMROOT=$PWD/build

    - name: Package IPA
      run: |
        APP=$(find build -name "*.app" -not -path "*/Intermediates*" | head -1)
        echo "App trouvée : $APP"
        brew install ldid
        ldid -SAccessiTools/entitlements.plist "$APP/AccessiTools"
        mkdir -p Payload
        cp -r "$APP" Payload/AccessiTools.app
        zip -r AccessiTools.ipa Payload/
        echo "✅ IPA créé : $(du -sh AccessiTools.ipa)"

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: AccessiTools-v2-IPA
        path: AccessiTools.ipa
        retention-days: 30
