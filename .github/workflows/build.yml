name: Build AccessiTools v2 IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode 15
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Build (sans signature Apple)
      run: |
        xcodebuild \
          -project AccessiTools.xcodeproj \
          -scheme AccessiTools \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEAD_CODE_STRIPPING=NO \
          build \
          SYMROOT=$PWD/build

    - name: Installer ldid (signeur TrollStore)
      run: |
        brew install ldid
        echo "ldid version: $(ldid 2>&1 | head -1)"

    - name: Signer avec entitlements TrollStore
      run: |
        APP=$(find build -name "*.app" | head -1)
        BIN="$APP/AccessiTools"
        echo "Binary: $BIN"

        # Signe avec les entitlements TrollStore
        ldid -SAccessiTools/entitlements.plist "$BIN"
        echo "✅ Entitlements appliqués"

    - name: Créer le IPA
      run: |
        APP=$(find build -name "*.app" | head -1)
        echo "App: $APP"

        mkdir -p Payload
        cp -r "$APP" Payload/AccessiTools.app

        # Crée le IPA (c'est juste un zip renommé)
        zip -r AccessiTools.ipa Payload/
        echo "✅ IPA: $(du -sh AccessiTools.ipa)"

        # Vérifie le contenu
        echo "Contenu:"
        ls -la Payload/AccessiTools.app/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: AccessiTools-v2-IPA
        path: AccessiTools.ipa
        retention-days: 30

    - name: Résumé
      run: |
        echo "═══════════════════════════════════"
        echo "  ✅ AccessiTools v2 compilé !"
        echo "  📱 Installe via TrollStore"
        echo "═══════════════════════════════════"
        echo ""
        echo "Fonctionnalités v2 :"
        echo "  🔄 Rotation GLOBALE (SpringBoard)"
        echo "  ⌨️  Clavier flottant DRAGGABLE"
        echo "  💾 Clavier reste en arrière-plan"
